seed: 1234

model_interface: "ModelInterface"
# ModelInterface expects:
# - model_class_name = python module name in models/ (without .py)
# - class name = CamelCase of model_class_name (underscores -> caps)
model_class_name: "MGModule_metadata_only"
use_compile: True

# Metadata-only model params (see models/MGModule_metadata_only.py)
num_meta_features: 10
hidden_dims: [64, 128, 128]
dropout_rate: 0.2

resume_from_manual_checkpoint: null

loss: [FocalLoss]
loss_weight: [1]
weight_decay: 1.0e-3
focal_loss_alpha: [1.2031558185404339, 0.594541910331384, 2.053872053872054]
focal_loss_gamma: 1

enable_checkpointing: True
devices: 1
strategy: "auto"
max_epochs: 200
lr: 5.0e-04
lr_decay_epochs: 200
lr_decay_min_lr: 1.0e-06
lr_scheduler: "cosine"
warmup_epochs: 25
warmup_lr: 1.0e-06
gradient_clip_val: 1.0

dataset_name: "TDLUDataset_torchio_four_view_mask_meta_avg_10_folds_STAMP"
meta_cols: ["mamm_age", "PATIENTI_BMI", "BreastDensity", "RACE_COMPOSITE"]
num_folds: 5
cross_val_fold: 0
split_ratio: [0.8, 0.1, 0.1]  # train, val, test
mamm_only: True
batch_size: 32
test_batch_size: 1
num_save: 50
num_bins: 3
target: "tdlu_density_extreme_zero"
label_type: "label"
run_dir: "./runs"
num_workers: 6
persistent_workers: False
pin_memory: False

# These paths are still required by the dataset/datamodule even if the model ignores images.
image_dir: "/beacon-projects/mammography/tdlu/dataset/STAMP/breast_cropped_float32/windowed_original_source/processed_png"
dense_mask_dir: "/beacon-projects/mammography/tdlu/dataset/STAMP/breast_cropped_float32/windowed_original_source/masks_png"
breast_mask_dir: null
csv_path: "/beacon-projects/mammography/tdlu/dataset/STAMP/stamp_annot_md_TDLU_y2026m01d23.csv"
use_augmentation: True
weights_json_path: null
device: "cuda"

log_dir: "/beacon-projects/mammography/tdlu/runs"
experiment_name: "meta_only_tdlu_stamp_5folds_fold{fold}"
log_every_n_steps: 1
