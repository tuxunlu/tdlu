# config.yaml

seed: 1234  # Random seed for reproducibility

# Model configuration. Choose one of:
#   - "MGModule"
#   - "MGModule_SingleHead"
#   - "MGModuleViT"
#   - "MGModule_SingleHead_Mamm_Only"
model_interface: "ModelInterface"
model_class_name: "MGModule_four_view_meta_avg_cross_attention_regression"
# Optionally, specify a pretrained model path (use null if not used)
pretrained_path: /beacon-scratch/tuxunlu/git/tdlu/mgh_mammo_MIRAI_Base_May20_2019.p
use_compile: True  # Use TorchScript compilation for faster inference
freeze_backbone: False  # Freeze the backbone model during training
range_min: 0
range_max: 1000

# Loss configuration. The current options are:
#   - "cross_entropy"
#   - "hierarchical_cross_entropy"
loss: [HuberLoss]  
loss_weight: [1.0]  # Weight for the loss function
weight_decay: 1.0e-3


# Training configuration.
enable_checkpointing: True  # Enable model checkpointing
lr: 5.0e-4
max_epochs: 1000
lr_scheduler: "cyclic"
lr_decay_epochs: 200
lr_decay_min_lr: 5.0e-7

# Hyperparameters configuration.
# Note: Some of these values (e.g., target, description, num_bins, batch_size)
# are overwritten later in the script; adjust these here if desired.
dataset_name: "TDLUDataset_torchio_four_view_meta_avg_folds"
meta_cols: ['BreastDensity_avg_four', 'mamm_age', 'cbmi_donation', 'geanc_Race']
cross_val_fold: 5
mamm_only: True
batch_size: 24
test_batch_size: 1 
num_save: 20
num_bins: 3
target: "tdlu_density"            # Target label name.
label_type: "raw"
run_dir: "./runs"                 # Base directory to save run outputs.
num_workers: 12
persistent_workers: False
pin_memory: False
# Image directory for the training data.
image_dir: "/beacon-scratch/tuxunlu/git/tdlu/dataset/WUSTL_png_nomarker_16"
# CSV file containing annotations.
csv_path: "/beacon-scratch/tuxunlu/git/tdlu/dataset/umd_annot_md_TDLU_y2025m07d09.csv"
augment: True
weights_json_path: null           # Optional weights JSON path (if applicable)
device: "cuda"                    # Use "cuda" if a GPU is available, otherwise "cpu"

# Logging configuration.
log_dir: "/beacon-scratch/tuxunlu/git/tdlu/runs"
experiment_name: "config_torchio_3bins_tdlu_four_views_fold_5_focalloss_gamma1_randomapply_meta_zero_extreme_avg_cross_attention_aug_corrected_0.5_0.7_0.5_shuffle_regression"
log_every_n_steps: 1  # Log every n steps